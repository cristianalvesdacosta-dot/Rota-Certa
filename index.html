<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rota Certa Pro | Assistente</title>
    
    <script>
        const CONFIG_PRECO_MENSAL = "29,90"; 
        const CONFIG_CHAVE_PIX = "SEU-PIX-AQUI"; 
        const CONFIG_WHATSAPP = "55919XXXXXXXX"; 
        const CONFIG_NOME_BANCO = "Nubank - Cristian Alves";
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --green: #2ecc71; --red: #e74c3c; --bg: #000; --card: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .logo { font-weight: 900; color: var(--green); font-size: 22px; text-align: center; margin: 20px 0; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-green { background: var(--green); color: #000; margin-top: 10px; }
        .luz { width: 80px; height: 80px; border-radius: 50%; margin: 10px auto; border: 5px solid #222; transition: 0.5s; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; border-top: 1px solid #222; z-index: 100; }
        .nav-item { flex: 1; padding: 18px; text-align: center; color: #555; font-size: 11px; font-weight: bold; }
        .nav-item.active { color: var(--green); border-top: 2px solid var(--green); }
        .hint { font-size: 11px; color: var(--green); margin-bottom: 10px; display: block; }
        #block-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:9999; display:none; padding:30px; text-align:center; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="block-screen">
        <h2 style="color:var(--red); margin-top:50px;">Acesso Expirado</h2>
        <div class="card">
            <span>ASSINATURA MENSAL</span><br>
            <b style="font-size:32px; color:var(--green)">R$ <span id="val-exibido"></span></b>
        </div>
        <p>Pix: <b id="pix-exibido" style="color:var(--green)"></b><br><small id="banco-exibido"></small></p>
        <button class="btn btn-green" style="background:#25d366; color:#fff;" onclick="window.location.href='https://wa.me/'+CONFIG_WHATSAPP">RENOVAR NO WHATSAPP</button>
    </div>

    <div id="app-content">
        <div class="logo">ROTA CERTA PRO</div>

        <div id="tab-ast" class="container">
            <div class="card" style="text-align:center;">
                <div id="semaforo" class="luz" style="background:#333;"></div>
                <h3 id="txt-decisao">MONITORANDO...</h3>
                <div style="display:flex; justify-content:space-around;">
                    <div><small style="color:#888;">LUCRO REAL</small><br><b id="res-lucro">R$ 0,00</b></div>
                    <div><small style="color:#888;">GANHO/KM</small><br><b id="res-km">R$ 0,00</b></div>
                </div>
            </div>

            <div class="card">
                <select id="modo-trabalho">
                    <option value="app">MODO APP (UBER/99/IND)</option>
                    <option value="particular">MODO PARTICULAR (MOTOTÁXI)</option>
                </select>
                <input type="number" id="val-entrada" placeholder="Valor da Corrida (R$)">
                <input type="number" id="km-entrada" placeholder="KM Total">
                <input type="text" id="end-destino" placeholder="Destino para o GPS">
                <button class="btn btn-green" onclick="processar()">ANALISAR E ABRIR ROTA</button>
            </div>
        </div>

        <div id="tab-veiculo" class="container" style="display:none;">
            <div class="card">
                <h3 style="color:var(--green)">Perfil do Veículo</h3>
                
                <label style="font-size:12px; color:#888;">Selecione sua Categoria:</label>
                <select id="select-moto" onchange="sugerirValores()">
                    <option value="custom">Personalizado</option>
                    <option value="160">Moto 160cc (Titan/Bros/Fan)</option>
                    <option value="250">Moto 250cc (Twister/Fazer)</option>
                    <option value="carro">Carro Econômico</option>
                </select>

                <span id="msg-sugestao" class="hint" style="display:none;">✨ Sugerimos estes valores para sua categoria, mas você pode mudar!</span>

                <label>Consumo (KM por Litro)</label>
                <input type="number" id="moto-consumo" placeholder="Ex: 35">
                
                <label>Preço da Gasolina (R$)</label>
                <input type="number" id="gas-preco" value="6.20">
                
                <label>Sua Meta (R$ limpo por KM)</label>
                <input type="number" id="user-meta" placeholder="Ex: 2.00">
                
                <button class="btn btn-green" onclick="salvarConfig()">SALVAR CONFIGURAÇÃO</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="n-ast" onclick="mudarTab('ast')">ASSISTENTE</div>
        <div class="nav-item" id="n-vei" onclick="mudarTab('vei')">VEÍCULO</div>
    </nav>

    <script>
        // FIREBASE E CONFIG INICIAL
        document.getElementById('val-exibido').innerText = CONFIG_PRECO_MENSAL;
        document.getElementById('pix-exibido').innerText = CONFIG_CHAVE_PIX;
        document.getElementById('banco-exibido').innerText = CONFIG_NOME_BANCO;

        function sugerirValores() {
            const cat = document.getElementById('select-moto').value;
            const msg = document.getElementById('msg-sugestao');
            
            if(cat === '160') {
                document.getElementById('moto-consumo').value = 38;
                document.getElementById('user-meta').value = 1.80;
                msg.style.display = 'block';
            } else if(cat === '250') {
                document.getElementById('moto-consumo').value = 30;
                document.getElementById('user-meta').value = 2.20;
                msg.style.display = 'block';
            } else if(cat === 'carro') {
                document.getElementById('moto-consumo').value = 12;
                document.getElementById('user-meta').value = 2.50;
                msg.style.display = 'block';
            } else {
                msg.style.display = 'none';
            }
        }

        function processar() {
            const v = parseFloat(document.getElementById('val-entrada').value);
            const k = parseFloat(document.getElementById('km-entrada').value);
            const consumo = parseFloat(document.getElementById('moto-consumo').value) || 35;
            const gas = parseFloat(document.getElementById('gas-preco').value) || 6.20;
            const meta = parseFloat(document.getElementById('user-meta').value) || 2.00;

            if(!v || !k) return alert("Preencha Valor e KM!");

            const custoKm = gas / consumo;
            const lucro = v - (k * custoKm);
            const rKm = lucro / k;

            const semaforo = document.getElementById('semaforo');
            const txt = document.getElementById('txt-decisao');

            if (rKm >= meta) {
                semaforo.style.background = "var(--green)";
                txt.innerText = "ACEITA! ✅";
                falar("Corrida boa! Pode aceitar.");
            } else if (rKm >= (meta * 0.7)) {
                semaforo.style.background = "var(--yellow)";
                txt.innerText = "AVALIE ⚠️";
            } else {
                semaforo.style.background = "var(--red)";
                txt.innerText = "RECUSE! ❌";
                falar("Cuidado, lucro muito baixo.");
            }

            document.getElementById('res-lucro').innerText = "R$ " + lucro.toFixed(2);
            document.getElementById('res-km').innerText = "R$ " + rKm.toFixed(2);

            const destino = document.getElementById('end-destino').value;
            if(destino) {
                setTimeout(() => {
                    window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destino)}`;
                }, 1500);
            }
        }

        function mudarTab(t) {
            document.getElementById('tab-ast').style.display = t === 'ast' ? 'block' : 'none';
            document.getElementById('tab-veiculo').style.display = t === 'vei' ? 'block' : 'none';
            document.getElementById('n-ast').classList.toggle('active', t === 'ast');
            document.getElementById('n-vei').classList.toggle('active', t === 'vei');
        }

        function falar(m) {
            const ut = new SpeechSynthesisUtterance(m);
            ut.lang = 'pt-BR';
            window.speechSynthesis.speak(ut);
        }

        function salvarConfig() { alert("Configuração Salva!"); }
    </script>
</body>
</html>
