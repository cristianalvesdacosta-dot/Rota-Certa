<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Moto Lucro Premium</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1a1a1a;
            --primary: #f97316;
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            --border: #333333;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 90px;
            user-select: none;
        }

        /* HEADER PREMIUM */
        header {
            padding: 25px 20px;
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        header h1 { font-size: 1.2rem; margin: 0; letter-spacing: 1px; color: var(--primary); }

        /* NAVEGAÇÃO ENTRE PÁGINAS */
        .page { display: none; padding: 15px; animation: fadeIn 0.2s ease-in; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS ESTILO DASHBOARD */
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .card-title { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 15px; font-weight: 600; text-transform: uppercase; }

        /* INPUTS GRANDES */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: var(--text-sub); }
        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #000;
            color: #fff;
            font-size: 1.1rem;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); outline: none; }

        /* BOTÕES PREMIUM */
        button {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-success { background: var(--success); color: #fff; margin-top: 15px; }
        .btn-danger { background: var(--danger); color: #fff; }

        /* RESULTADOS GRID */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .stat-box { background: #000; padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-label { font-size: 0.7rem; color: var(--text-sub); margin-bottom: 5px; }
        .stat-value { font-size: 1rem; font-weight: 700; }

        /* PROGRESSO META */
        .progress-bg { background: #333; height: 12px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-bar { background: var(--primary); height: 100%; width: 0%; transition: 0.5s; }

        /* MENU INFERIOR FIXO */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid var(--border);
        }
        .nav-btn { background: none; border: none; color: var(--text-sub); font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; width: auto; padding: 0; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { font-style: normal; font-size: 1.4rem; margin-bottom: 5px; }

        /* LISTA DE CORRIDAS */
        .item-corrida {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: #000; border-radius: 12px; margin-bottom: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>MOTO LUCRO PREMIUM</h1>
</header>

<div id="page-calc" class="page active">
    <div class="card">
        <div class="card-title">Simulador de Viagem</div>
        <div class="input-group">
            <label>Valor da Corrida (R$)</label>
            <input type="number" id="v-corrida" inputmode="decimal" placeholder="0.00">
        </div>
        <div class="input-group">
            <label>KM Total (Até o cliente + Entrega)</label>
            <input type="number" id="k-corrida" inputmode="decimal" placeholder="0.0">
        </div>
        <button class="btn-primary" onclick="calcular()">CALCULAR LUCRO</button>

        <div id="resultado" style="display:none; margin-top:20px;">
            <div class="stat-box" style="text-align:center; border-color: var(--primary);">
                <div class="stat-label">LUCRO LÍQUIDO ESTIMADO</div>
                <div id="lucro-valor" class="stat-value" style="font-size: 1.8rem; color: var(--success);">R$ 0.00</div>
            </div>
            <button class="btn-success" onclick="salvar()">ACEITAR E SALVAR</button>
        </div>
    </div>
</div>

<div id="page-ganhos" class="page">
    <div class="card">
        <div class="card-title">Meta Diária</div>
        <div class="progress-bg"><div id="progress-bar"></div></div>
        <div style="display:flex; justify-content:space-between; font-weight:700;">
            <span id="txt-ganho">R$ 0.00</span>
            <span id="txt-meta-perc" style="color:var(--primary)">0%</span>
        </div>
    </div>

    <div id="historico-lista">
        </div>
    
    <button onclick="limparTudo()" style="background:none; color:var(--danger); font-size:0.8rem; margin-top:20px;">Zerar todos os registros</button>
</div>

<div id="page-perfil" class="page">
    <div class="card">
        <div class="card-title">Minha Moto & Custos</div>
        <div class="input-group">
            <label>Consumo (KM/L)</label>
            <input type="number" id="cfg-cons" value="35" oninput="saveConfig()">
        </div>
        <div class="input-group">
            <label>Preço Gasolina (R$)</label>
            <input type="number" id="cfg-prec" value="5.80" oninput="saveConfig()">
        </div>
        <div class="input-group">
            <label>Custos Fixos Mes (Financ/Manut)</label>
            <input type="number" id="cfg-fixo" value="450" oninput="saveConfig()">
        </div>
        <div class="input-group">
            <label>Meta Diária (R$)</label>
            <input type="number" id="cfg-meta" value="200" oninput="saveConfig()">
        </div>
    </div>

    <div class="card">
        <div class="card-title">Seu custo atual</div>
        <div class="grid-stats">
            <div class="stat-box">
                <div class="stat-label">Custo por KM</div>
                <div id="res-custo-km" class="stat-value">R$ 0.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Meta Batida</div>
                <div id="res-total-dia" class="stat-value">R$ 0.00</div>
            </div>
        </div>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="nav('page-calc', this)"><i>📊</i>Calculadora</button>
    <button class="nav-btn" onclick="nav('page-ganhos', this)"><i>💰</i>Ganhos</button>
    <button class="nav-btn" onclick="nav('page-perfil', this)"><i>⚙️</i>Perfil</button>
</nav>

<script>
    let corridas = JSON.parse(localStorage.getItem('m_premium_corridas')) || [];
    let config = JSON.parse(localStorage.getItem('m_premium_cfg')) || {c: 35, p: 5.80, f: 450, m: 200};
    let custoKm = 0;

    function nav(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'page-ganhos') renderGanhos();
        if(id === 'page-perfil') renderPerfil();
    }

    function saveConfig() {
        config = {
            c: parseFloat(document.getElementById('cfg-cons').value) || 1,
            p: parseFloat(document.getElementById('cfg-prec').value) || 0,
            f: parseFloat(document.getElementById('cfg-fixo').value) || 0,
            m: parseFloat(document.getElementById('cfg-meta').value) || 0
        };
        localStorage.setItem('m_premium_cfg', JSON.stringify(config));
        calcCustoFixo();
    }

    function calcCustoFixo() {
        // Custo gasosa + diluição de custos fixos em 2500km rodados/mês
        custoKm = (config.p / config.c) + (config.f / 2500);
        const el = document.getElementById('res-custo-km');
        if(el) el.innerText = "R$ " + custoKm.toFixed(2);
    }

    function calcular() {
        const v = parseFloat(document.getElementById('v-corrida').value);
        const k = parseFloat(document.getElementById('k-corrida').value);
        if(!v || !k) return;

        const lucro = v - (k * custoKm);
        document.getElementById('resultado').style.display = 'block';
        const elLucro = document.getElementById('lucro-valor');
        elLucro.innerText = "R$ " + lucro.toFixed(2);
        elLucro.style.color = lucro > (v * 0.4) ? "#22c55e" : "#ef4444";
    }

    function salvar() {
        const v = parseFloat(document.getElementById('v-corrida').value);
        const k = parseFloat(document.getElementById('k-corrida').value);
        corridas.push({v, k, id: Date.now(), t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
        localStorage.setItem('m_premium_corridas', JSON.stringify(corridas));
        
        document.getElementById('v-corrida').value = '';
        document.getElementById('k-corrida').value = '';
        document.getElementById('resultado').style.display = 'none';
        alert("Corrida Salva!");
    }

    function renderGanhos() {
        const total = corridas.reduce((a, b) => a + b.v, 0);
        const perc = Math.min((total / config.m) * 100, 100);
        
        document.getElementById('txt-ganho').innerText = "R$ " + total.toFixed(2);
        document.getElementById('txt-meta-perc').innerText = Math.round(perc) + "%";
        document.getElementById('progress-bar').style.width = perc + "%";

        const lista = document.getElementById('historico-lista');
        lista.innerHTML = '<div class="card-title">Corridas de Hoje</div>';
        
        [...corridas].reverse().forEach(c => {
            lista.innerHTML += `
                <div class="item-corrida">
                    <div>
                        <div style="font-weight:700">R$ ${c.v.toFixed(2)}</div>
                        <div style="font-size:0.7rem; color:var(--text-sub)">${c.t} • ${c.k} KM</div>
                    </div>
                    <button onclick="remover(${c.id})" style="width:auto; background:none; color:var(--danger); padding:5px;">Apagar</button>
                </div>
            `;
        });
    }

    function remover(id) {
        corridas = corridas.filter(c => c.id !== id);
        localStorage.setItem('m_premium_corridas', JSON.stringify(corridas));
        renderGanhos();
    }

    function renderPerfil() {
        document.getElementById('cfg-cons').value = config.c;
        document.getElementById('cfg-prec').value = config.p;
        document.getElementById('cfg-fixo').value = config.f;
        document.getElementById('cfg-meta').value = config.m;
        document.getElementById('res-total-dia').innerText = "R$ " + corridas.reduce((a, b) => a + b.v, 0).toFixed(2);
        calcCustoFixo();
    }

    function limparTudo() {
        if(confirm("Deseja apagar todos os registros de hoje?")) {
            corridas = [];
            localStorage.removeItem('m_premium_corridas');
            renderGanhos();
        }
    }

    window.onload = () => {
        renderPerfil();
        calcCustoFixo();
    }
</script>
</body>
</html>
