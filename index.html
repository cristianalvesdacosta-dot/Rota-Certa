<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Cristian - Organizado</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #eee; padding: 15px; margin: 0; }
        .card { background: #161616; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        
        /* Seção de Configuração Organizada */
        .config-section { border-left: 4px solid #00897b; padding-left: 15px; }
        .config-item { margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: #00897b; font-weight: bold; margin-bottom: 2px; }
        
        input { width: 92%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; font-size: 14px; }
        .btn-save { background: #333; color: #00897b; border: 1px solid #00897b; padding: 8px; width: 100%; border-radius: 6px; font-size: 12px; margin-top: 5px; cursor: pointer; }
        .btn-add { width: 100%; padding: 15px; background: #00897b; border: none; color: white; font-weight: bold; border-radius: 6px; margin-top: 15px; font-size: 16px; }
        
        /* Grid de Envelopes */
        .envelopes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .env { padding: 10px; border-radius: 6px; font-size: 10px; text-align: center; border: 1px solid #333; }
        .env strong { display: block; font-size: 14px; margin-top: 4px; }
        
        .header-pf { background: #4a148c; grid-column: span 2; padding: 15px; border: none; }
        .bg-gas { background: #b71c1c; }
        .bg-moto { background: #e65100; }
        .bg-ipva { background: #01579b; }
        .bg-multa { background: #d32f2f; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #222; color: #00897b; }
        .btn-del { background: #c62828; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <h3 style="text-align: center; color: #00897b;">🏍️ CONTROLE CRISTIAN</h3>

    <div class="card config-section">
        <div class="config-item">
            <label>MÉDIA KM POR LITRO</label>
            <input type="number" id="media_km" placeholder="Ex: 35">
        </div>
        <div class="config-item">
            <label>PREÇO DO LITRO (GASOLINA)</label>
            <input type="number" id="preco_gas" placeholder="Ex: 6.10">
        </div>
        <div class="config-item">
            <label>META DIÁRIA MOTO (Geralmente 32.00)</label>
            <input type="number" id="meta_moto" placeholder="Ex: 32">
        </div>
        <div class="config-item">
            <label>RESERVA IPVA (VALOR POR KM)</label>
            <input type="number" id="reserva_ipva" placeholder="Ex: 0.05">
        </div>
        <button class="btn-save" onclick="salvarConfig()">SALVAR CONFIGURAÇÕES</button>
    </div>

    <div class="card">
        <label>TOTAL QUE CAIU NO APP (R$)</label>
        <input type="number" id="bruto" placeholder="R$ 0,00">
        
        <label style="margin-top: 10px;">KM TOTAL RODADO NO DIA</label>
        <input type="number" id="km" placeholder="0 km">
        
        <button class="btn-add" onclick="registrar()">CALCULAR E DISTRIBUIR</button>

        <div class="envelopes">
            <div class="env header-pf">SALÁRIO LÍQUIDO (CONTA PF)<strong id="res-pf">R$ 0,00</strong></div>
            <div class="env bg-gas">⛽ GASOLINA<strong id="res-gas">R$ 0,00</strong></div>
            <div class="env bg-moto">🏍️ META MOTO<strong id="res-moto">R$ 0,00</strong></div>
            <div class="env bg-ipva">📄 IPVA/TAXAS<strong id="res-ipva">R$ 0,00</strong></div>
            <div class="env bg-multa">⚠️ RESERVA MULTA<strong id="res-multa">R$ 0,00</strong></div>
        </div>
    </div>

    <table id="tabela">
        <thead>
            <tr>
                <th>Data</th>
                <th>KM</th>
                <th>Bruto</th>
                <th>Líquido</th>
                <th>Apagar</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        let db = JSON.parse(localStorage.getItem('gestao_cristian_v4')) || [];
        let config = JSON.parse(localStorage.getItem('config_cristian_v4')) || { media: 35, preco: 6.10, meta: 32, ipva: 0.05 };

        document.getElementById('media_km').value = config.media;
        document.getElementById('preco_gas').value = config.preco;
        document.getElementById('meta_moto').value = config.meta;
        document.getElementById('reserva_ipva').value = config.ipva;

        function salvarConfig() {
            config = {
                media: parseFloat(document.getElementById('media_km').value),
                preco: parseFloat(document.getElementById('preco_gas').value),
                meta: parseFloat(document.getElementById('meta_moto').value),
                ipva: parseFloat(document.getElementById('reserva_ipva').value)
            };
            localStorage.setItem('config_cristian_v4', JSON.stringify(config));
            alert("Configurações Salvas com Sucesso!");
        }

        function registrar() {
            const bruto = parseFloat(document.getElementById('bruto').value);
            const km = parseFloat(document.getElementById('km').value);
            if (!bruto || !km) return alert("Por favor, preencha o valor e a quilometragem!");

            const gas = (km / config.media) * config.preco;
            const metaMoto = config.meta;
            const reservaIpva = km * config.ipva;
            const reservaMulta = km * 0.03; 

            const liquido = bruto - gas - metaMoto - reservaIpva - reservaMulta;

            document.getElementById('res-pf').innerText = "R$ " + liquido.toFixed(2);
            document.getElementById('res-gas').innerText = "R$ " + gas.toFixed(2);
            document.getElementById('res-moto').innerText = "R$ " + metaMoto.toFixed(2);
            document.getElementById('res-ipva').innerText = "R$ " + reservaIpva.toFixed(2);
            document.getElementById('res-multa').innerText = "R$ " + reservaMulta.toFixed(2);

            db.unshift({
                data: new Date().toLocaleDateString('pt-BR').substring(0,5),
                km: km,
                bruto: bruto.toFixed(2),
                liquido: liquido.toFixed(2)
            });
            render();
        }

        function render() {
            const tbody = document.querySelector('#tabela tbody');
            tbody.innerHTML = '';
            db.forEach((item, i) => {
                tbody.innerHTML += `<tr>
                    <td>${item.data}</td>
                    <td>${item.km}</td>
                    <td>R$ ${item.bruto}</td>
                    <td><strong>R$ ${item.liquido}</strong></td>
                    <td><button class="btn-del" onclick="apagar(${i})">X</button></td>
                </tr>`;
            });
            localStorage.setItem('gestao_cristian_v4', JSON.stringify(db));
        }

        function apagar(i) { if(confirm("Deseja mesmo apagar este registro?")) { db.splice(i,1); render(); } }

        render();
    </script>
</body>
</html>
