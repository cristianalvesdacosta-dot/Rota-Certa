<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rota Certa Pro | Oficial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --green: #2ecc71; --blue: #3498db; --red: #e74c3c; --bg: #000; --card: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .logo { font-weight: 900; color: var(--green); font-size: 22px; text-align: center; margin: 20px 0; }
        label { display: block; font-size: 11px; color: var(--green); margin: 10px 0 4px 0; font-weight: bold; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 5px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-green { background: var(--green); color: #000; }
        .btn-blue { background: var(--blue); color: #fff; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; padding: 15px; text-align: center; color: #555; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--green); border-top: 2px solid var(--green); }
        #map { width: 100%; height: 250px; border-radius: 15px; margin-bottom: 15px; background: #222; z-index: 1; }
        .hidden { display: none !important; }
        
        .cron-item { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="app-main" class="container">
        <div class="logo">ROTA CERTA PRO</div>

        <div id="tab-ast">
            <div class="card">
                <label>Meta do Dia (R$)</label>
                <input type="number" id="meta-dia" value="150" onchange="atualizarGanhos()">
                <div style="background:#222; height:12px; border-radius:10px; margin:15px 0; overflow:hidden;"><div id="barra-fill" style="background:var(--green); height:100%; width:0%;"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>Ganhos: <b id="txt-ganho">R$ 0,00</b></span>
                    <span>Falta: <b id="txt-falta" style="color:var(--blue)">R$ 0,00</b></span>
                </div>
            </div>

            <div class="card">
                <label>Valor da Corrida</label>
                <input type="number" id="val-entrada" placeholder="R$ 0,00">
                <label>Distância (KM)</label>
                <input type="number" id="km-entrada" placeholder="0.0">
                <button class="btn btn-green" onclick="processar()">ANALISAR</button>
                <div id="resultado-rapido" style="margin-top:10px; text-align:center; font-weight:bold;"></div>
            </div>
        </div>

        <div id="tab-map" class="hidden">
            <div id="map"></div>
            <div class="card">
                <label>Para onde vamos?</label>
                <input type="text" id="dest-input" placeholder="Destino em Belém/Outeiro">
                <button class="btn btn-green" onclick="buscarETracar()">CALCULAR ROTA E CUSTO</button>
                <div id="info-rota" style="margin-top:15px; font-size:14px; line-height:1.6;"></div>
            </div>
        </div>

        <div id="tab-vei" class="hidden">
            <div class="card">
                <h3>Cronograma Editável</h3>
                <label>Sua Estratégia de Hoje:</label>
                <textarea id="cron-texto" rows="5" placeholder="Ex: 08:00 - Outeiro Centro&#10;11:00 - Entrega Flash&#10;17:00 - Volta pra Belém"></textarea>
                <button class="btn btn-blue" onclick="salvarCronograma()">SALVAR CRONOGRAMA</button>
            </div>

            <div class="card">
                <h3>Dados da Moto</h3>
                <label>Consumo (KM/L)</label>
                <input type="number" id="v-consumo" value="38">
                <label>Gasolina (R$)</label>
                <input type="number" id="v-gas" value="6.20">
                <button class="btn btn-green" onclick="salvarConfig()">SALVAR CONFIGURAÇÕES</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="n-ast" onclick="mudarTab('ast')">LUCRO</div>
        <div class="nav-item" id="n-map" onclick="mudarTab('map')">RADAR</div>
        <div class="nav-item" id="n-vei" onclick="mudarTab('vei')">PERFIL</div>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC2PyMxApIjZ_bEcyV1FdftHQHzi7irM4k", authDomain: "rota-certa-861e7.firebaseapp.com", projectId: "rota-certa-861e7", storageBucket: "rota-certa-861e7.firebasestorage.app", messagingSenderId: "56675221849", appId: "1:56675221849:web:ebe796a6f2a93cba204c48" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let mapL, routeControl, mLat, mLng;

        function mudarTab(t) {
            document.querySelectorAll('.container > div:not(.logo)').forEach(d => d.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('n-' + t).classList.add('active');
            if(t === 'map' && !mapL) initMap();
        }

        function initMap() {
            mapL = L.map('map').setView([-1.45, -48.48], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapL);
            navigator.geolocation.getCurrentPosition(p => {
                mLat = p.coords.latitude; mLng = p.coords.longitude;
                mapL.setView([mLat, mLng], 15);
                L.marker([mLat, mLng]).addTo(mapL).bindPopup("Você").openPopup();
            });
        }

        async function buscarETracar() {
            const dest = document.getElementById('dest-input').value;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dest}, Belém`);
            const data = await res.json();
            
            if(data[0]) {
                const dLat = data[0].lat; const dLng = data[0].lon;
                if (routeControl) mapL.removeControl(routeControl);

                routeControl = L.Routing.control({
                    waypoints: [L.latLng(mLat, mLng), L.latLng(dLat, dLng)],
                    lineOptions: { styles: [{ color: '#2ecc71', weight: 6 }] },
                    createMarker: () => null,
                    addWaypoints: false,
                    show: false // Oculta painel de texto para não travar
                }).on('routesfound', function(e) {
                    const r = e.routes[0];
                    const dist = (r.summary.totalDistance / 1000).toFixed(1);
                    const cons = parseFloat(document.getElementById('v-consumo').value);
                    const gas = parseFloat(document.getElementById('v-gas').value);
                    const custo = (dist * (gas / cons)).toFixed(2);

                    document.getElementById('info-rota').innerHTML = `
                        <span style="color:var(--green)">✔ Rota Calculada</span><br>
                        Distância: <b>${dist} KM</b><br>
                        Gasto de Gasolina: <b style="color:var(--red)">R$ ${custo}</b>
                    `;
                }).addTo(mapL);
            }
        }

        function salvarCronograma() {
            const texto = document.getElementById('cron-texto').value;
            localStorage.setItem('RC_CRON_TEXTO', texto);
            alert("Estratégia salva!");
        }

        function salvarConfig() {
            const c = document.getElementById('v-consumo').value;
            const g = document.getElementById('v-gas').value;
            localStorage.setItem('RC_CONFIG', JSON.stringify({consumo: c, gas: g}));
            alert("Dados da moto salvos!");
        }

        window.onload = () => {
            const cronSalvo = localStorage.getItem('RC_CRON_TEXTO');
            if(cronSalvo) document.getElementById('cron-texto').value = cronSalvo;

            const configSalva = JSON.parse(localStorage.getItem('RC_CONFIG'));
            if(configSalva) {
                document.getElementById('v-consumo').value = configSalva.consumo;
                document.getElementById('v-gas').value = configSalva.gas;
            }
        };

        function processar() {
            const v = parseFloat(document.getElementById('val-entrada').value) || 0;
            const k = parseFloat(document.getElementById('km-entrada').value) || 1;
            const c = parseFloat(document.getElementById('v-consumo').value);
            const g = parseFloat(document.getElementById('v-gas').value);
            const lucro = v - (k * (g / c));
            document.getElementById('resultado-rapido').innerHTML = `Lucro: <span style="color:var(--green)">R$ ${lucro.toFixed(2)}</span>`;
        }
    </script>
</body>
</html>
