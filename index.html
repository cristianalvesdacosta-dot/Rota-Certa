<div id="calculadora-lucro" class="card" style="margin-top:20px;">
    <h3>Calculadora de Lucro Real</h3>
    <input type="number" id="valorCorrida" placeholder="Valor Bruto (R$)">
    <input type="number" id="distanciaCorrida" placeholder="Distância Total (KM)">
    
    <div style="display:flex; gap:10px; margin-bottom:10px;">
        <input type="number" id="custoCombustivel" placeholder="Custo p/ KM (Ex: 0.50)" style="font-size:12px;">
    </div>

    <button class="btn-main" onclick="calcularLucroReal()">CALCULAR AGORA</button>

    <div id="resultado-semaforo" style="margin-top:20px; display:none;">
        <div id="bola-semaforo" style="width:80px; height:80px; border-radius:50%; margin: 0 auto; border: 5px solid #333;"></div>
        <h2 id="msg-resultado"></h2>
        <p id="detalhe-lucro" style="font-size:14px; color:#aaa;"></p>
    </div>
</div>

<div class="card" style="margin-top:20px; text-align:left;">
    <h3>Meu Histórico</h3>
    <div id="lista-historico" style="font-size:13px; max-height:200px; overflow-y:auto;">
        </div>
</div>
