<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Cristian - Uber/99</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 15px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        input { width: 93%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #252525; color: white; }
        .btn-add { width: 100%; padding: 12px; background: #00c853; border: none; color: white; font-weight: bold; border-radius: 5px; margin-top: 10px; }
        .resumo { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .box { padding: 10px; border-radius: 5px; text-align: center; font-size: 0.9em; }
        .mei { background: #1565c0; }
        .pf { background: #6a1b9a; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-backup { flex: 1; padding: 8px; font-size: 12px; border-radius: 5px; border: 1px solid #555; background: #333; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; }
        th { background: #222; }
        .btn-del { background: #d32f2f; color: white; border: none; padding: 4px 8px; border-radius: 3px; }
    </style>
</head>
<body>

    <h3>🏍️ Gestão de Diárias (MEI vs PF)</h3>

    <div class="card">
        <input type="number" id="bruto" placeholder="Valor Bruto App (R$)">
        <input type="number" id="km" placeholder="KM Total do Dia">
        <button class="btn-add" onclick="adicionarDado()">Registrar Diária</button>

        <div class="resumo">
            <div class="box mei">MEI (Moto):<br><strong id="res-mei">R$ 0,00</strong></div>
            <div class="box pf">PF (Seu):<br><strong id="res-pf">R$ 0,00</strong></div>
        </div>

        <div class="btn-group">
            <button class="btn-backup" onclick="exportarBackup()">📥 Salvar Backup</button>
            <button class="btn-backup" onclick="document.getElementById('fileInput').click()">📤 Abrir Backup</button>
            <input type="file" id="fileInput" style="display:none" onchange="importarBackup(event)">
        </div>
    </div>

    <table id="tabela-dados">
        <thead>
            <tr>
                <th>Data</th>
                <th>KM</th>
                <th>R$/KM</th>
                <th>PF (L)</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        let historico = JSON.parse(localStorage.getItem('uber_data')) || [];

        function atualizarTabela() {
            const tbody = document.querySelector('#tabela-dados tbody');
            tbody.innerHTML = '';
            historico.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.data}</td>
                    <td>${item.km}</td>
                    <td>${item.rkm}</td>
                    <td>${item.pf}</td>
                    <td><button class="btn-del" onclick="removerDado(${index})">X</button></td>
                `;
                tbody.appendChild(tr);
            });
            localStorage.setItem('uber_data', JSON.stringify(historico));
        }

        function adicionarDado() {
            const bruto = parseFloat(document.getElementById('bruto').value);
            const km = parseFloat(document.getElementById('km').value);
            if (!bruto || !km) return alert("Preencha os campos!");

            const custoMei = km * 0.35;
            const salarioPf = bruto - custoMei;
            const rkm = (bruto / km).toFixed(2);

            document.getElementById('res-mei').innerText = "R$ " + custoMei.toFixed(2);
            document.getElementById('res-pf').innerText = "R$ " + salarioPf.toFixed(2);

            historico.unshift({
                data: new Date().toLocaleDateString('pt-BR').substring(0,5),
                km: km,
                rkm: rkm,
                pf: salarioPf.toFixed(2)
            });

            atualizarTabela();
        }

        function removerDado(index) {
            if(confirm("Deseja apagar essa diária?")) {
                historico.splice(index, 1);
                atualizarTabela();
            }
        }

        function exportarBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(historico));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "backup_gestao_uber.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importarBackup(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                historico = JSON.parse(e.target.result);
                atualizarTabela();
            };
            reader.readAsText(event.target.files[0]);
        }

        atualizarTabela();
    </script>
</body>
</html>
