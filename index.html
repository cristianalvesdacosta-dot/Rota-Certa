<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Moto Assistente</title>
    <style>
        :root {
            --primary: #fbbf24;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --danger: #ef4444;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px; /* Espaço para o menu inferior */
            overflow-x: hidden;
        }

        /* CABEÇALHO */
        header {
            padding: 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        /* SEÇÕES (PÁGINAS) */
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.2rem; color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; }

        /* INPUTS ESTILIZADOS */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); outline: none; }

        /* BOTÕES */
        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }

        .btn-main { background: var(--primary); color: #000; }
        .btn-save { background: var(--success); color: white; margin-top: 10px; }
        .btn-blue { background: var(--accent); color: white; }

        /* MENU INFERIOR */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #334155;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.7rem;
            background: none;
            border: none;
            padding: 5px;
        }

        .nav-item.active-nav { color: var(--primary); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }

        /* BARRA DE PROGRESSO */
        .progress-container { background: #0f172a; border-radius: 10px; height: 12px; margin: 15px 0; }
        #progress-bar { background: var(--success); height: 100%; width: 0%; border-radius: 10px; transition: 0.5s; }

        /* HISTÓRICO */
        .history-card {
            background: #334155;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* BADGES */
        .badge { background: #0f172a; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
    </style>
</head>
<body>

<header>
    <h3 style="margin:0; color: var(--primary)">MOTO ASSISTENTE</h3>
</header>

<div id="calculadora" class="page active">
    <h2>📊 Analisar Corrida</h2>
    <div class="card">
        <div class="input-group">
            <label>Valor da Corrida (R$)</label>
            <input type="number" id="valCorr" inputmode="decimal" placeholder="0,00">
        </div>
        <div class="input-group">
            <label>KM Total (Ida + Volta)</label>
            <input type="number" id="kmCorr" inputmode="decimal" placeholder="0.0">
        </div>
        <button class="btn-main" onclick="analisar()">SIMULAR AGORA</button>
        
        <div id="res-box" style="display:none; margin-top:15px;" class="badge">
            <span id="res-texto"></span>
            <button class="btn-save" id="btn-add" onclick="registrar()">ACEITAR CORRIDA</button>
        </div>
    </div>
</div>

<div id="metas" class="page">
    <h2>💰 Meus Ganhos</h2>
    <div class="card">
        <label>Meta Diária (R$)</label>
        <input type="number" id="metaDia" value="200" oninput="atualizarMeta()">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div style="display: flex; justify-content: space-between;">
            <span>Ganhos: R$ <b id="totalH">0.00</b></span>
            <span id="perc-meta">0%</span>
        </div>
    </div>

    <div id="lista-corridas">
        </div>
    <button onclick="limpar()" style="color:gray; background:none; font-size:0.8rem">Zerar dados de hoje</button>
</div>

<div id="gps" class="page">
    <h2>📍 Navegação Rápida</h2>
    <div class="card">
        <label>Endereço de Destino</label>
        <input type="text" id="dest-mapa" placeholder="Ex: Rua Tal, 100, Belém">
        <button class="btn-blue" style="margin-top:10px" onclick="irMapa()">ABRIR NO GOOGLE MAPS</button>
    </div>
</div>

<div id="perfil" class="page">
    <h2>⚙️ Minha Moto</h2>
    <div class="card">
        <label>Tanque (L)</label>
        <input type="number" id="tanq" value="16" oninput="salvarMoto()">
        <label>Consumo (KM/L)</label>
        <input type="number" id="cons" value="35" oninput="salvarMoto()">
        <label>Preço Litro (R$)</label>
        <input type="number" id="prec" value="5.80" oninput="salvarMoto()">
        
        <div class="badge" style="margin-top:15px">
            Seu KM custa: <b style="color:var(--primary)">R$ <span id="custoFinal">0.00</span></b>
        </div>
    </div>
</div>

<nav>
    <button class="nav-item active-nav" onclick="irPara('calculadora', this)"><i>📊</i>Calc</button>
    <button class="nav-item" onclick="irPara('metas', this)"><i>💰</i>Ganhos</button>
    <button class="nav-item" onclick="irPara('gps', this)"><i>📍</i>GPS</button>
    <button class="nav-item" onclick="irPara('perfil', this)"><i>⚙️</i>Moto</button>
</nav>

<script>
    let dados = JSON.parse(localStorage.getItem('m_corridas')) || [];
    let custo = 0;

    function irPara(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
        if(id === 'metas') atualizarMeta();
    }

    function salvarMoto() {
        const c = document.getElementById('cons').value || 1;
        const p = document.getElementById('prec').value || 0;
        custo = p / c;
        document.getElementById('custoFinal').innerText = custo.toFixed(2);
        localStorage.setItem('m_moto', JSON.stringify({t: document.getElementById('tanq').value, c, p}));
    }

    function analisar() {
        const v = parseFloat(document.getElementById('valCorr').value);
        const k = parseFloat(document.getElementById('kmCorr').value);
        if(!v || !k) return;

        const g = k * custo;
        const l = v - g;
        const resBox = document.getElementById('res-box');
        resBox.style.display = 'block';
        
        const cor = l > (v*0.4) ? '#22c55e' : '#ef4444';
        document.getElementById('res-texto').innerHTML = `Sobram: <b style="color:${cor}">R$ ${l.toFixed(2)}</b>`;
    }

    function registrar() {
        const v = parseFloat(document.getElementById('valCorr').value);
        const k = parseFloat(document.getElementById('kmCorr').value);
        dados.push({v, k, t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), id: Date.now()});
        localStorage.setItem('m_corridas', JSON.stringify(dados));
        alert("Salvo com sucesso!");
        document.getElementById('valCorr').value = '';
        document.getElementById('kmCorr').value = '';
        document.getElementById('res-box').style.display = 'none';
    }

    function atualizarMeta() {
        const meta = parseFloat(document.getElementById('metaDia').value) || 1;
        const total = dados.reduce((a, b) => a + b.v, 0);
        const perc = Math.min((total/meta)*100, 100);
        
        document.getElementById('totalH').innerText = total.toFixed(2);
        document.getElementById('progress-bar').style.width = perc + '%';
        document.getElementById('perc-meta').innerText = Math.round(perc) + '%';

        const lista = document.getElementById('lista-corridas');
        lista.innerHTML = '<h4>Histórico Hoje</h4>';
        [...dados].reverse().forEach(i => {
            lista.innerHTML += `
                <div class="history-card">
                    <span>${i.t} - R$ ${i.v.toFixed(2)} (${i.k}km)</span>
                    <button onclick="remover(${i.id})" style="width:auto; padding:5px 10px; background:var(--danger); font-size:12px">X</button>
                </div>
            `;
        });
    }

    function remover(id) {
        dados = dados.filter(x => x.id !== id);
        localStorage.setItem('m_corridas', JSON.stringify(dados));
        atualizarMeta();
    }

    function irMapa() {
        const d = document.getElementById('dest-mapa').value;
        if(d) window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(d)}&travelmode=motorcycle`, '_blank');
    }

    function limpar() {
        if(confirm("Zerar tudo?")) { dados = []; localStorage.removeItem('m_corridas'); atualizarMeta(); }
    }

    window.onload = () => {
        const m = JSON.parse(localStorage.getItem('m_moto'));
        if(m) {
            document.getElementById('tanq').value = m.t;
            document.getElementById('cons').value = m.c;
            document.getElementById('prec').value = m.p;
        }
        salvarMoto();
    }
</script>

</body>
</html>
