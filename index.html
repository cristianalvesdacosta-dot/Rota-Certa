<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Cristian AI - Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #eee; padding: 15px; }
        .card { background: #161616; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .config-card { background: #1b1b1b; border: 1px dashed #555; font-size: 12px; }
        input { width: 92%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; }
        .btn-add { width: 100%; padding: 14px; background: #00897b; border: none; color: white; font-weight: bold; border-radius: 6px; margin-top: 10px; }
        
        .envelopes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .env { padding: 10px; border-radius: 6px; font-size: 11px; text-align: center; border: 1px solid #333; }
        .env strong { display: block; font-size: 14px; margin-top: 4px; }
        
        .header-pf { background: #4a148c; grid-column: span 2; padding: 15px; }
        .bg-gas { background: #b71c1c; }
        .bg-manut { background: #e65100; }
        .bg-fixo { background: #01579b; }
        .bg-parcela { background: #1b5e20; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 10px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; }
        .btn-del { background: #c62828; color: white; border: none; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="card config-card">
        <strong>⚙️ Configurações do Veículo</strong><br>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="media_km" placeholder="Média KM/L (Ex: 35)" onchange="salvarConfig()">
            <input type="number" id="preco_gas" placeholder="Preço Gasosa (Ex: 6.10)" onchange="salvarConfig()">
            <input type="number" id="tanque" placeholder="Tanque (L)" onchange="salvarConfig()">
        </div>
        <small>* Os cálculos de combustível serão baseados nesses dados.</small>
    </div>

    <div class="card">
        <input type="number" id="bruto" placeholder="Valor Total do App (R$)">
        <input type="number" id="km" placeholder="KM Total Rodada">
        <button class="btn-add" onclick="registrar()">Calcular com Precisão</button>

        <div class="envelopes">
            <div class="env header-pf">LUCRO REAL (CONTA PF)<strong id="res-pf">R$ 0,00</strong></div>
            <div class="env bg-gas">⛽ COMBUSTÍVEL<strong id="res-gas">R$ 0,00</strong></div>
            <div class="env bg-manut">🔧 MANUTENÇÃO<strong id="res-manut">R$ 0,00</strong></div>
            <div class="env bg-fixo">📋 FIXOS/MEI/CEL<strong id="res-fixo">R$ 0,00</strong></div>
            <div class="env bg-parcela">🏍️ PARCELA/MOTO<strong id="res-parcela">R$ 0,00</strong></div>
        </div>
    </div>

    <table id="tabela">
        <thead>
            <tr>
                <th>Data</th>
                <th>KM</th>
                <th>R$/KM</th>
                <th>Líquido</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        let db = JSON.parse(localStorage.getItem('gestao_ai')) || [];
        let config = JSON.parse(localStorage.getItem('config_ai')) || { media: 35, preco: 6.00, tanque: 12 };

        // Carrega configs salvas nos campos
        document.getElementById('media_km').value = config.media;
        document.getElementById('preco_gas').value = config.preco;
        document.getElementById('tanque').value = config.tanque;

        function salvarConfig() {
            config = {
                media: parseFloat(document.getElementById('media_km').value) || 35,
                preco: parseFloat(document.getElementById('preco_gas').value) || 6,
                tanque: parseFloat(document.getElementById('tanque').value) || 12
            };
            localStorage.setItem('config_ai', JSON.stringify(config));
        }

        function registrar() {
            const bruto = parseFloat(document.getElementById('bruto').value);
            const km = parseFloat(document.getElementById('km').value);
            if (!bruto || !km) return alert("Insira os dados!");

            // CÁLCULO INTELIGENTE BASEADO NO VEÍCULO
            const custo_gas_km = config.preco / config.media;
            const gas = km * custo_gas_km;
            
            const manut = km * 0.08;
            const fixo = km * 0.05;
            const parcela = km * 0.05;
            const liquido = bruto - (gas + manut + fixo + parcela);

            document.getElementById('res-pf').innerText = "R$ " + liquido.toFixed(2);
            document.getElementById('res-gas').innerText = "R$ " + gas.toFixed(2);
            document.getElementById('res-manut').innerText = "R$ " + manut.toFixed(2);
            document.getElementById('res-fixo').innerText = "R$ " + fixo.toFixed(2);
            document.getElementById('res-parcela').innerText = "R$ " + parcela.toFixed(2);

            db.unshift({
                data: new Date().toLocaleDateString('pt-BR').substring(0,5),
                km: km,
                rkm: (bruto/km).toFixed(2),
                liquido: liquido.toFixed(2)
            });
            render();
        }

        function render() {
            const tbody = document.querySelector('#tabela tbody');
            tbody.innerHTML = '';
            db.forEach((item, i) => {
                tbody.innerHTML += `<tr>
                    <td>${item.data}</td>
                    <td>${item.km}</td>
                    <td>R$ ${item.rkm}</td>
                    <td><strong>R$ ${item.liquido}</strong></td>
                    <td><button class="btn-del" onclick="apagar(${i})">X</button></td>
                </tr>`;
            });
            localStorage.setItem('gestao_ai', JSON.stringify(db));
        }

        function apagar(i) { if(confirm("Apagar registro?")) { db.splice(i,1); render(); } }

        render();
    </script>
</body>
</html>
